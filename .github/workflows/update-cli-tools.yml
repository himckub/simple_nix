name: Update CLI tools

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:       # manual trigger

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-cli-tools
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Run update script
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rc=0
          scripts/update-tools.sh || rc=$?
          case "$rc" in
            0) echo "updated=true"  >> "$GITHUB_OUTPUT" ;;
            1) echo "updated=false" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::update-tools.sh failed (exit $rc)"; exit 1 ;;
          esac

      - name: Create or update pull request
        if: steps.update.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="auto/update-cli-tools"
          git checkout -B "$BRANCH"
          git commit -am "chore: update cli tools"
          git push -fu origin "$BRANCH"
          gh pr list --head "$BRANCH" --json number -q '.[0].number' | grep -q . || \
            gh pr create --title "chore: update cli tools" \
              --body "Automated version bump of AI coding tools (claude-code, gemini-cli, opencode, codex)."
