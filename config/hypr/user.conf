# WORKFLOW CHEATSHEET:
#
# Apps:
#   Super+Q              = kitty
#   Super+R              = rofi launcher
#   Super+E              = file manager
#
# Windows:
#   Super+C              = close window
#   Super+F              = zoom in (multi-window workspace)
#   Super+Shift+F        = true fullscreen (hides bar)
#   Super+V              = toggle floating
#   Super+J              = toggle split direction
#   Super+arrows         = move focus
#   Super+Shift+arrows   = swap tile positions
#   Super+Ctrl+arrows    = resize tiles
#   Super+drag           = move floating window
#   Super+right-drag     = resize floating window
#
# Workspaces:
#   Super+1-9            = jump to workspace
#   Super+Shift+1-9      = move window to workspace
#   Super+scroll          = cycle workspaces
#   Super+S              = toggle scratchpad
#   Super+M              = toggle layout (dwindle/master)
#   Alt+Tab              = window picker (rofi)
#
# Utilities:
#   Super+Space          = switch keyboard (US/RU)
#   Super+P              = toggle pseudo tiling
#   Super+L              = lock screen
#   Super+/              = keybind cheatsheet
#   Super+N              = notification history (full bodies)
#   Super+Ctrl+S         = move window to scratchpad
#   Print                = screenshot region
#   Super+Shift+S        = screenshot region
#   Super+Print          = screenshot full monitor


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
# Catch-all so the scale applies to whatever output the monitor lands on.
# Connector names (DP-1 vs DP-4) shuffle across reboots on this multi-GPU box,
# so pinning to one port left the display at scale 1.0 after a reboot.
# highrr keeps max refresh (4K panels often report 4K60 as preferred).
monitor = , highrr, auto, 1.666667


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun


#################
### AUTOSTART ###
#################

# Essential services
exec-once = hyprpanel
exec-once = hyprpaper
# exec-once = hypridle  # autolock disabled
exec-once = nm-applet --indicator
exec-once = blueman-applet

# Polkit agent (for admin password prompts)
exec-once = lxqt-policykit-agent


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

# NOTE: keep cursor size in sync with cursorSize in nixos/host.nix
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
# NOTE: GDK_SCALE must be integer; GDK_DPI_SCALE = monitorScale / GDK_SCALE
# Adjust both when changing monitor scale (monitor line above)
env = GDK_SCALE,2
env = GDK_DPI_SCALE,0.8333
# NOTE: keep in sync with qt settings in nixos/home/theming.nix
env = QT_QPA_PLATFORMTHEME,kde
env = QT_STYLE_OVERRIDE,breeze
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

xwayland {
    force_zero_scaling = true
}

cursor {
    no_hardware_cursors = true
}

render {
    expand_undersized_textures = true
}


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 7

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgb(FF8F40)
    col.inactive_border = rgb(1A1D23)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = true

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 0
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 12
        render_power = 2
        color = rgba(FF8F4033)
        color_inactive = rgba(0B0E1400)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 4
        new_optimizations = true

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    bezier = overshot,       0.13, 0.99, 0.29, 1.1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     2,     easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1,     default
    animation = workspacesIn,  1,     1,     default
    animation = workspacesOut, 1,     1,     default
    animation = zoomFactor,    1,     7,     quick
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    preserve_split = true # You probably want this
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vrr = 2                    # G-Sync in fullscreen games only
    focus_on_activate = true   # clicking notifications switches to that workspace+window
}

#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    # NOTE: keep in sync with services.xserver.xkb in nixos/desktop.nix
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:win_space_toggle
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    repeat_rate = 35
    repeat_delay = 400

    touchpad {
        natural_scroll = false
    }
}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0
bind = ALT, Tab, exec, rofi -show window
bind = $mainMod, L, exec, loginctl lock-session
bind = $mainMod, slash, exec, ~/.config/hypr/cheatsheet.sh
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = $mainMod, M, exec, ~/.config/hypr/toggle-layout.sh
bind = $mainMod, N, exec, kitty --class=notif-log sh -c '~/.config/hypr/notif-log.py | less -R'

# Screenshots (grimblast)
bind = , Print, exec, grimblast copysave area
bind = $mainMod SHIFT, S, exec, grimblast copysave area
bind = $mainMod, Print, exec, grimblast copysave output

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Swap window positions with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize tiles with mainMod + CTRL + arrow keys
binde = $mainMod CTRL, right, resizeactive, 40 0
binde = $mainMod CTRL, left, resizeactive, -40 0
binde = $mainMod CTRL, up, resizeactive, 0 -40
binde = $mainMod CTRL, down, resizeactive, 0 40

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad (hidden overlay workspace)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod CTRL, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Blur the floating panel bar
layerrule = blur true, match:namespace ^bar-
layerrule = xray true, match:namespace ^bar-

# Rofi launcher -- blur behind
layerrule = blur true, match:namespace ^rofi$
layerrule = ignore_alpha 0.3, match:namespace ^rofi$

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Smart gaps - single window fills screen
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, match:float false, match:workspace w[tv1]
windowrule = rounding 0, match:float false, match:workspace w[tv1]
windowrule = border_size 0, match:float false, match:workspace f[1]
windowrule = rounding 0, match:float false, match:workspace f[1]

# General window rules
windowrule = suppress_event fullscreen maximize, match:class .*


# Float utility windows
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(wdisplays)$
windowrule = float on, match:class ^(org.gnome.seahorse.Application)$
windowrule = float on, match:class ^(lxqt-policykit-agent)$

# Float file dialogs
windowrule = float on, match:title ^(Open File)$
windowrule = float on, match:title ^(Select a File)$
windowrule = float on, match:title ^(Open Folder)$
windowrule = float on, match:title ^(Save As)$
windowrule = float on, match:title ^(File Upload)$
windowrule = float on, match:title ^(Choose Files)$

# Picture-in-Picture
windowrule {
  name = pip
  match:title = ^(Picture in Picture)$
  float = on
  pin = on
  size = (monitor_w*0.25) (monitor_h*0.25)
  move = (monitor_w*0.73) (monitor_h*0.72)
}

# Steam
windowrule = float on, match:class ^(steam)$, match:title ^((?!Steam).*)$

# Gaming - tearing for reduced input latency
windowrule = immediate on, match:class ^(steam_app_.*)$
windowrule = immediate on, match:class ^(.*\.exe)$

# XWayland fix
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false
